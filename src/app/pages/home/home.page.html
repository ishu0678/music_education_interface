<div class="ion-page" id="main-content">
  <ion-content [fullscreen]="true">
    <div id="container">
      <div class="wrapper" id="wrapper" [class.is-playing]="isPlaying()" [class.is-idle]="!isPlaying()">
        <div class="top-middle-container">
          <div class="top" [ngClass]="!isPlaying()?'landscape-d-none':''">
            <div class="metronome status-panel">
              <div class="metronome-bullet">
                <h1 id="metronome-label" *ngIf="beat$|async as beat">
                  {{ beat.beat >= 0 ? (beat.beat + 1): '&nbsp;'}}
                </h1>
                <semaphore-light [currentAction]="currentAction"></semaphore-light>
              </div>
            </div>
            <ng-container *ngIf="mode === 'tuner'">
              <div class="chromatic-tuner visual-panel">
                <chromatic-tuner [refFrequencyValue$]="refFrequencyValue$"></chromatic-tuner>
              </div>
            </ng-container>
            <ng-container *ngIf="selectedInstrument === 'trumpet' && mode === 'trumpet'">
              <div class="trumpet visual-panel">
                <trumpet-diagram [trumpetButtons]="trumpetBtns"></trumpet-diagram>
              </div>
            </ng-container>
            <ng-container *ngIf="selectedInstrument === 'clarinet' && mode === 'clarinet'">
              <div class="clarinet visual-panel">
               
                <img [src]="clarinetPosition" alt="Clarinet Position" />
              </div>
            </ng-container>
            <ng-container *ngIf="selectedInstrument === 'oboe' && mode === 'oboe'">
              <div class="oboe visual-panel">
               
                <img [src]="oboePosition" alt="Oboe Position" />
              </div>
            </ng-container>

          </div>
          <!--MIDDLE-->
          <div class="middle" *ngIf="isPlaying()">
            <div class="score">
              <score-view id="score-image" [score]="score" [language]="language"></score-view>
            </div>
          </div>
        </div>

        <div class="bottom" *ngIf="!isPlaying()">
          <div class="controls controls-margin">
            <!--TEMPO-->
            <div class="tempo-wrapper">
                <tempo-selector *ngIf="tempo$ | async as tempo" 
                  [tempo]="tempo" 
                  (change)="changeTempo($event)"
                ></tempo-selector>              
            </div>

            <div class="low-note-wrapper">
              <note-selector 
                label="Lowest Note:"
                [note]="lowNote" 
                [selectedInstrument]="selectedInstrument"
                [useFlatsAndSharps]="useFlatsAndSharps"
                (change)="changeLowNote($event)"
              ></note-selector>
            </div>

            <div class="high-note-wrapper">
              <note-selector 
                label="Highest Note:"
                [note]="highNote"
                [selectedInstrument]="selectedInstrument"
                [useFlatsAndSharps]="useFlatsAndSharps"
                (change)="changeHighNote($event)"
              ></note-selector>
            </div>

          </div>

          <div class="ios-audio-hint" *ngIf="showIOSWebAudioHint">
            <span>On iPhone/iPad browsers, audio may be muted when the side switch is set to Silent.</span>
            <button type="button" class="ios-audio-hint-dismiss" (click)="dismissIOSWebAudioHint()">Dismiss</button>
          </div>
        </div>
      </div>

    </div>
  </ion-content>

  <ion-footer>
    <ion-button (click)="startStop()" expand="block">
      {{isPlaying() ? 'Stop':'Start'}}
    </ion-button>
  </ion-footer>

</div>
