<ion-menu contentId="tabs-shell" menuId="settingsMenu">
    <ion-header>
        <ion-toolbar>
            <ion-title>Options</ion-title>
        </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding">
        <ion-list>
            <ion-item [disabled]="isDisabled()">
                <ion-label>Select Instrument</ion-label>
                <ion-select
                    (ionChange)="selectInstrument($event)"
                    mode="ios"
                    [value]="selectedInstrument"
                    interface="popover"
                    [interfaceOptions]="instrumentSelectInterfaceOptions"
                >
                    <ion-select-option value="trumpet">Trumpet</ion-select-option>
                    <ion-select-option value="clarinet">Clarinet</ion-select-option>
                    <ion-select-option value="oboe">Oboe</ion-select-option>
                </ion-select>
            </ion-item>

            <ng-container *ngIf="selectedInstrument">
                <ion-item [disabled]="isDisabled()">
                    <ion-label>Mode</ion-label>
                    <ion-segment class="mode-switcher" (ionChange)="switchMode($event)" mode="ios" [value]="mode">
                        <ion-segment-button *ngIf="selectedInstrument === 'trumpet'" value="trumpet">
                            <ion-label>TRUMPET</ion-label>
                        </ion-segment-button>
                        <ion-segment-button *ngIf="selectedInstrument === 'clarinet'" value="clarinet">
                            <ion-label>CLARINET</ion-label>
                        </ion-segment-button>
                        <ion-segment-button *ngIf="selectedInstrument === 'oboe'" value="oboe">
                            <ion-label>OBOE</ion-label>
                        </ion-segment-button>
                        <ion-segment-button value="tuner">
                            <ion-label>TUNER</ion-label>
                        </ion-segment-button>
                    </ion-segment>
                </ion-item>

                <ion-item button (click)="openPicker('frequency')" [disabled]="isDisabled()">
                    <ion-label>A4</ion-label>
                    <ion-note slot="end">{{ refFrequencyValue$ }} Hz</ion-note>
                </ion-item>

                <ion-item>
                    <ion-toggle [checked]="useFlatsAndSharps" (ionChange)="switchUseFlatsAndSharps($event)" [disabled]="isDisabled()">
                        <b>&flat; &amp; &sharp;</b>
                    </ion-toggle>
                </ion-item>

                <ion-item [disabled]="isDisabled()">
                    <ion-label>Nomenclature</ion-label>
                    <ion-select
                        (ionChange)="changeLanguage($event)"
                        [value]="language"
                        interface="alert"
                        [interfaceOptions]="nomenclatureSelectInterfaceOptions"
                    >
                        <ion-select-option value="en">C, D, E</ion-select-option>
                        <ion-select-option value="it">Do, Re, Mi</ion-select-option>
                    </ion-select>
                </ion-item>

                <ion-item>
                    <ion-toggle [checked]="useDynamics" (ionChange)="switchUseDynamics($event)" [disabled]="isDisabled()">
                        Dynamics
                    </ion-toggle>
                </ion-item>

                <ion-item>
                    <ion-toggle [checked]="isDarkMode" (ionChange)="switchDarkMode($event)">
                        Dark Mode
                    </ion-toggle>
                </ion-item>
            </ng-container>
        </ion-list>
    </ion-content>
</ion-menu>

<div class="ion-page" id="tabs-shell">
    <ion-tabs
        #tabs
        (ionTabsDidChange)="onChange($event)"
    >
        <ion-tab-bar class="custom-tab-bar d-flex ion-justify-content-between">
            <ion-tab-button
                tab
                [disabled]="isDisabled()"
                (click)="openMenu()"
            >
                <ion-icon
                    name="settings-outline"
                    style="margin-bottom: 2px;"
                ></ion-icon>
                Options
            </ion-tab-button>
            <ion-tab-button
                tab="exercise"
                [disabled]="isDisabled()"
                (click)="prepareExerciseMedia()"
            >
                <ion-icon
                    name="musical-notes"
                    style="margin-bottom: 2px;"
                ></ion-icon>
                Exercise
            </ion-tab-button>
            <ion-tab-button
                tab="tuner"
                [disabled]="isDisabled()"
                (click)="prepareTunerMedia()"
            >
                <ion-icon
                    name="radio"
                    style="margin-bottom: 2px;"
                ></ion-icon>
                Tuner
            </ion-tab-button>
        </ion-tab-bar>
    </ion-tabs>
</div>
